# ─────────────────────────────────────────────
# Orchen — netlify.toml
# Deploy: push to GitHub, connect repo in Netlify.
# No build command needed — pure static site.
# ─────────────────────────────────────────────

[build]
  publish = "."
  # No build command for a static site

# ─── REDIRECT: post-form-submit success page ───
# Netlify will handle the form POST and redirect here.
# Create a success.html if you want a custom thank-you page;
# otherwise Netlify shows its default success screen.
[[redirects]]
  from   = "/success"
  to     = "/"
  status = 200

# ─── SECURITY HEADERS ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# ─── CACHE HEADERS ───────────────────────────────
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
